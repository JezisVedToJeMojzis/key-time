# Free scheduler for Key Time: every few minutes, send any due "It's key time!"
# notifications by talking straight to Postgres — so the Render web service can
# sleep and you don't spend Render's free hours keeping it awake.
#
# Setup: add repo secrets (Settings → Secrets and variables → Actions):
#   DATABASE_URL, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY
name: key-time-tick

on:
  schedule:
    # Every 5 minutes (GitHub's minimum granularity; runs may be a few min late).
    - cron: '*/5 * * * *'
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

concurrency:
  group: key-time-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/tick.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: mailto:mojzissamuel@gmail.com
